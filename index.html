{% extends 'base.html' %}
{% block title %}Accueil — MediCollect{% endblock %}

{% block content %}
<div class="hero">
  <img src="{{ url_for('static', filename='hospital.avif') }}" class="hero-img" alt="Hospital">
  <h1><i class="fas fa-hospital"></i> MediCollect</h1>
  <p class="hero-subtitle">Collecte et Analyse Descriptive des Données des Patients</p>
</div>

<div class="form-container">
  <h2><i class="fas fa-user-plus"></i> Enregistrer un Patient</h2>

  <form action="{{ url_for('add_patient') }}" method="POST" class="patient-form">

    <div class="form-section">
      <h3><i class="fas fa-user"></i> Informations Personnelles</h3>
      <div class="form-grid">
        <div class="form-group">
          <label>Nom complet *</label>
          <input type="text" name="nom" required placeholder="Ex: Kamga Jean">
        </div>

        <div class="form-group">
          <label>Âge *</label>
          <input type="number" name="age" min="0" max="120" required placeholder="Ex: 33">
        </div>

        <div class="form-group">
          <label>Sexe *</label>
          <select name="sexe" required>
            <option value="">-- Choisir --</option>
            <option value="Homme">Homme</option>
            <option value="Femme">Femme</option>
          </select>
        </div>

        <div class="form-group">
          <label>Groupe sanguin</label>
          <select name="groupe_sanguin">
            <option value="">-- Choisir --</option>
            {% for gs in groupes_sanguins %}
              <option value="{{ gs }}">{{ gs }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label>Poids (kg)</label>
          <input type="number" step="0.1" name="poids" placeholder="Ex: 72.5">
        </div>
      </div>
    </div>

    <div class="form-section">
      <h3><i class="fas fa-stethoscope"></i> Informations Médicales</h3>
      <div class="form-grid">
        <div class="form-group">
          <label>Maladie / Diagnostic *</label>
          <select name="maladie" required>
            <option value="">-- Choisir --</option>
            {% for m in maladies %}
              <option value="{{ m }}">{{ m }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label>Service *</label>
          <select name="service" required>
            <option value="">-- Choisir --</option>
            {% for s in services %}
              <option value="{{ s }}">{{ s }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label>Température (°C) *</label>
          <input type="number" step="0.1" min="34" max="43" name="temperature" required placeholder="Ex: 37.6">
        </div>

        <div class="form-group">
          <label>Tension systolique (mmHg)</label>
          <input type="number" name="tension_systolique" placeholder="Ex: 120">
        </div>

        <div class="form-group">
          <label>Tension diastolique (mmHg)</label>
          <input type="number" name="tension_diastolique" placeholder="Ex: 80">
        </div>
      </div>
    </div>

    <div class="form-section">
      <h3><i class="fas fa-money-bill-wave"></i> Hospitalisation</h3>
      <div class="form-grid">
        <div class="form-group">
          <label>Durée d'hospitalisation (jours) *</label>
          <input type="number" name="duree" min="1" max="365" required placeholder="Ex: 14">
        </div>

        <div class="form-group">
          <label>Coût du traitement (FCFA) *</label>
          <input type="number" name="cout" min="0" step="500" required placeholder="Ex: 30000">
        </div>
      </div>
    </div>

    <button class="btn-submit" type="submit">
      <i class="fas fa-save"></i> Enregistrer
    </button>
  </form>
</div>
{% endblock %}
