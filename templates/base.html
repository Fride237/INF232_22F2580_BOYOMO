<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}MediCollect{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static',filename='style.css') }}">
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<nav class="navbar">
  <div class="brand"><i class="fas fa-hospital-alt"></i> MediCollect</div>
  <div class="nav-links">
    <a href="{{ url_for('index') }}"   class="{{ 'active' if request.endpoint=='index' }}">
      <i class="fas fa-home"></i> Accueil</a>
    <a href="{{ url_for('data') }}"    class="{{ 'active' if request.endpoint=='data' }}">
      <i class="fas fa-database"></i> Données</a>
    <a href="{{ url_for('analyse') }}" class="{{ 'active' if request.endpoint=='analyse' }}">
      <i class="fas fa-chart-line"></i> Analyse</a>
    <a href="{{ url_for('export') }}"  class="btn-export">
      <i class="fas fa-download"></i> CSV</a>
  </div>
</nav>

<div class="container">
  {% with msgs = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in msgs %}
      <div class="alert alert-{{ cat }}">
        {{ msg }}
        <span onclick="this.parentElement.remove()" style="cursor:pointer;float:right">&times;</span>
      </div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>

<footer>
  🏥 <strong>MediCollect</strong> — INF 232 EC2 &nbsp;|&nbsp;
  Collecte &amp; Analyse Descriptive des Données Hospitalières
</footer>
</body>
</html>
